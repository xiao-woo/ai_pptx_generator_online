<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PPT 生成器 - MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="text"].error,
        textarea.error {
            border-color: #ff4444;
        }

        .error-message {
            color: #ff4444;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .result p {
            color: #666;
            line-height: 1.6;
        }

        .result.success {
            background: #e8f5e9;
            border: 2px solid #4caf50;
        }

        .result.error {
            background: #ffebee;
            border: 2px solid #f44336;
        }

        .result.success h3 {
            color: #2e7d32;
        }

        .result.error h3 {
            color: #c62828;
        }

        .result.success p {
            color: #388e3c;
        }

        .result.error p {
            color: #d32f2f;
        }

        .action-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            flex: 1;
        }

        .action-buttons button.secondary {
            background: #e0e0e0;
            color: #333;
        }

        .action-buttons button.secondary:hover {
            background: #d0d0d0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI PPT 生成器</h1>
        <p class="subtitle">使用人工智能快速生成专业的演示文稿</p>

        <form id="pptForm">
            <div class="form-group">
                <label for="topic">演示主题</label>
                <input type="text" id="topic" name="topic" placeholder="例如：人工智能的未来" required>
                <div class="error-message" id="topicError">请输入演示主题</div>
            </div>

            <div class="form-group">
                <label for="content">内容描述</label>
                <textarea id="content" name="content" placeholder="描述您想要包含的内容要点..." required></textarea>
                <div class="error-message" id="contentError">请输入内容描述</div>
            </div>

            <button type="submit" id="submitBtn">生成 PPT</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在生成PPT，请稍候...</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="result" id="result">
            <h3 id="resultTitle">生成结果</h3>
            <p id="resultText"></p>
            <div class="action-buttons" id="actionButtons">
                <button type="button" class="secondary" id="resetBtn">重新生成</button>
                <button type="button" id="downloadBtn">下载 PPT</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('pptForm');
        const topicInput = document.getElementById('topic');
        const contentInput = document.getElementById('content');
        const topicError = document.getElementById('topicError');
        const contentError = document.getElementById('contentError');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const progressFill = document.getElementById('progressFill');
        const result = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultText = document.getElementById('resultText');
        const actionButtons = document.getElementById('actionButtons');
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // 实时验证
        topicInput.addEventListener('input', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
                topicError.classList.remove('show');
            }
        });

        contentInput.addEventListener('input', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
                contentError.classList.remove('show');
            }
        });

        // 表单提交
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // 验证
            let isValid = true;

            if (!topicInput.value.trim()) {
                topicInput.classList.add('error');
                topicError.classList.add('show');
                isValid = false;
            }

            if (!contentInput.value.trim()) {
                contentInput.classList.add('error');
                contentError.classList.add('show');
                isValid = false;
            }

            if (!isValid) {
                return;
            }

            // 显示加载状态
            submitBtn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show');

            // 模拟进度
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 20;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(progressInterval);
                }
                progressFill.style.width = progress + '%';
            }, 200);

            // 模拟AI生成
            setTimeout(() => {
                clearInterval(progressInterval);
                progressFill.style.width = '100%';

                // 隐藏加载状态
                loading.classList.remove('show');
                submitBtn.disabled = false;

                // 显示结果
                const topic = topicInput.value;
                const content = contentInput.value;

                result.classList.remove('success', 'error');
                result.classList.add('success');
                resultTitle.textContent = '生成成功！';
                resultText.innerHTML = `
                    <strong>主题：</strong>${topic}<br><br>
                    <strong>内容：</strong>${content}<br><br>
                    <strong>状态：</strong>✅ PPT生成成功！<br>
                    <strong>说明：</strong>这是MVP版本，功能正在开发中...
                `;
                result.classList.add('show');
                actionButtons.style.display = 'flex';
            }, 3000);
        });

        // 重新生成
        resetBtn.addEventListener('click', function() {
            result.classList.remove('show');
            actionButtons.style.display = 'none';
            form.reset();
            progressFill.style.width = '0%';
        });

        // 下载PPT
        downloadBtn.addEventListener('click', function() {
            alert('下载功能开发中...');
        });
    </script>
</body>
</html>
