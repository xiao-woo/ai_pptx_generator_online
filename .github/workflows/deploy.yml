name: Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /home/wangwei/.openclaw/workspace/ai-ppt-generator
          git pull origin master
          cd backend
          pip install -r requirements.txt
          cd ../frontend
          npm install
          npm run build
          # 重启服务
          pkill -f "uvicorn" || true
          pkill -f "vite" || true
          cd /home/wangwei/.openclaw/workspace/ai-ppt-generator/backend
          nohup python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          cd /home/wangwei/.openclaw/workspace/ai-ppt-generator/frontend
          nohup npm run dev -- --host 0.0.0.0 > /tmp/frontend.log 2>&1 &
          echo "Deployment completed"