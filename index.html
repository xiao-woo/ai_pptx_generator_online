<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PPT Generator - 测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        .status {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .features {
            background: #f3e5f5;
            border-left: 4px solid #9c27b0;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .tech {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }
        ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        li {
            margin: 5px 0;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI PPT Generator</h1>
        <p style="text-align: center; color: #666;">最小MVP版本 - 纯静态页面</p>

        <div class="status">
            <h3>✅ 部署状态</h3>
            <p>GitHub Pages部署成功！</p>
        </div>

        <div class="features">
            <h3>🎯 功能特性</h3>
            <ul>
                <li>• 纯静态页面</li>
                <li>• 无需后端API</li>
                <li>• 响应式设计</li>
                <li>• 现代化UI</li>
            </ul>
        </div>

        <div class="tech">
            <h3>📋 技术栈</h3>
            <ul>
                <li>• HTML5</li>
                <li>• CSS3</li>
                <li>• JavaScript</li>
                <li>• GitHub Pages</li>
            </ul>
        </div>

        <div class="footer">
            <p>Powered by HTML + CSS + JavaScript</p>
            <p style="font-size: 12px; margin-top: 10px;">最小MVP版本 v1.0 - 纯静态页面</p>
        </div>
    </div>
</body>
</html>
